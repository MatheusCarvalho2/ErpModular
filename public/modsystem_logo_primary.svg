<svg viewBox="0 0 640 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0B1220" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- ICON: modular block mark -->
  <g filter="url(#softShadow)">
    <rect x="12" y="12" width="82" height="82" rx="20" fill="url(#navyGrad)"/>
    <rect x="106" y="12" width="82" height="82" rx="20" fill="url(#blueGrad)"/>
    <rect x="12" y="106" width="82" height="82" rx="20" fill="url(#blueGrad)"/>
    <rect x="106" y="106" width="82" height="82" rx="20" fill="url(#navyGrad)"/>
  </g>

  <!-- WORDMARK -->
  <g font-family="Arial, Helvetica, sans-serif" font-weight="800">
    <text x="232" y="100" font-size="58" letter-spacing="-1" fill="#0B1220">Mod<tspan fill="#2563EB">System</tspan></text>
  </g>
  <text x="234" y="132" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" letter-spacing="4" fill="#64748B">ERP MODULAR</text>
</svg>
